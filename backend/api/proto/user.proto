syntax = "proto3";

package user;

option go_package = "github.com/delphismk/user-point-management-system/pkg/pb";

import "google/api/annotations.proto";

//ユーザ関連サービス
// protoを介してhttpとRPCのマッピングを行う(ルーティングテーブル)
service UserService {
    // ユーザ作成
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
        option (google.api.http) = {
            post: "/v1/users"
            body: "*"
        };
    }

    // ポイント加算
    rpc AddPoints(AddPointsRequest) returns (AddPointsResponse) {
        option (google.api.http) = {
          post: "/v1/users/{user_id}/points:add"
          body: "*"
        };
    }

    // ユーザ情報の表示
    rpc GetUser(GetUserRequest) returns (GetUserResponse) {
        option (google.api.http) = {
          get: "/v1/users/{user_id}"
        };
    }
}

message CreateUserRequest{
    string user_name = 1;
}

message CreateUserResponse {
    string user_id = 1;
    string user_name = 2;
    int32 user_points = 3;
}

message AddPointsRequest {
    string user_id = 1;
    int32 add_points = 2;
}

message AddPointsResponse {
    string user_id = 1;
    int32 user_points = 2;
}

message GetUserRequest {
    string user_id = 1;
}

message GetUserResponse {
    string user_id = 1;
    string user_name = 2;
    int32 user_points = 3;
}